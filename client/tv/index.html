<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1280, height=720">
  <title>DevLoop RPG</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    #game-container { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
    canvas { display: block; image-rendering: pixelated; }

    @keyframes borderGlow {
      0%   { border-color: rgba(255, 136, 0, 0.15); box-shadow: inset 0 0 60px rgba(255,136,0,0.03); }
      50%  { border-color: rgba(255, 136, 0, 0.45); box-shadow: inset 0 0 80px rgba(255,136,0,0.08); }
      100% { border-color: rgba(255, 136, 0, 0.15); box-shadow: inset 0 0 60px rgba(255,136,0,0.03); }
    }

    @keyframes titlePulse {
      0%   { text-shadow: 0 0 10px rgba(255,136,0,0.3), 0 0 30px rgba(255,136,0,0.1); }
      50%  { text-shadow: 0 0 20px rgba(255,136,0,0.6), 0 0 50px rgba(255,136,0,0.2); }
      100% { text-shadow: 0 0 10px rgba(255,136,0,0.3), 0 0 30px rgba(255,136,0,0.1); }
    }

    @keyframes dots {
      0%   { content: ''; }
      25%  { content: '.'; }
      50%  { content: '..'; }
      75%  { content: '...'; }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    #waiting {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: radial-gradient(ellipse at center, #1a1a2e 0%, #0a0a12 100%);
      color: #ccc;
      font-family: 'Courier New', 'Lucida Console', monospace;
      z-index: 100;
      border: 2px solid rgba(255, 136, 0, 0.2);
      animation: borderGlow 3s ease-in-out infinite;
    }

    #waiting h1 {
      font-size: 52px;
      color: #ff8800;
      margin-bottom: 8px;
      letter-spacing: 6px;
      text-transform: uppercase;
      animation: titlePulse 3s ease-in-out infinite, fadeInUp 0.8s ease-out;
    }

    #waiting .subtitle {
      font-size: 14px;
      color: #555;
      letter-spacing: 4px;
      margin-bottom: 36px;
      animation: fadeInUp 0.8s ease-out 0.2s both;
    }

    #waiting .waiting-msg {
      font-size: 20px;
      color: #888;
      animation: fadeInUp 0.8s ease-out 0.4s both;
    }

    #waiting .waiting-msg::after {
      content: '';
      animation: dots 1.5s steps(4, end) infinite;
    }

    #waiting .url {
      color: #44cc44;
      font-size: 22px;
      margin-top: 24px;
      padding: 12px 24px;
      border: 1px solid rgba(68, 204, 68, 0.2);
      border-radius: 6px;
      background: rgba(68, 204, 68, 0.05);
      animation: fadeInUp 0.8s ease-out 0.6s both;
    }

    #waiting .player-info {
      margin-top: 40px;
      color: #555;
      font-size: 16px;
      animation: fadeInUp 0.8s ease-out 0.8s both;
    }

    #waiting .player-info span {
      color: #ff8800;
      font-weight: bold;
    }

    #waiting .qr-section {
      display: flex;
      align-items: center;
      gap: 24px;
      margin-top: 24px;
      animation: fadeInUp 0.8s ease-out 0.6s both;
    }

    #waiting .qr-section canvas {
      border: 3px solid rgba(255, 136, 0, 0.3);
      border-radius: 8px;
      image-rendering: auto;
    }

    #waiting .qr-label {
      font-size: 13px;
      color: #666;
      text-align: center;
      margin-top: 6px;
    }

    #waiting .qr-right {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    #waiting .qr-right .url {
      margin-top: 0;
      font-size: 18px;
    }

    #waiting .qr-right .scan-hint {
      font-size: 12px;
      color: #555;
      margin-top: 8px;
      letter-spacing: 1px;
    }

    #waiting.hidden { display: none; }
  </style>
</head>
<body>
  <div id="waiting">
    <h1>DevLoop RPG</h1>
    <div class="subtitle">DUNGEON CRAWLER</div>
    <p class="waiting-msg">Waiting for heroes</p>
    <div class="qr-section">
      <div>
        <canvas id="qr-p1" width="140" height="140"></canvas>
        <div class="qr-label">Player 1</div>
      </div>
      <div>
        <canvas id="qr-p2" width="140" height="140"></canvas>
        <div class="qr-label">Player 2</div>
      </div>
      <div class="qr-right">
        <p class="url">http://<span id="server-ip">localhost</span>:3000/phone</p>
        <p class="scan-hint">SCAN QR CODE WITH YOUR PHONE</p>
      </div>
    </div>
    <p class="player-info">Players: <span id="player-count">0</span>/2</p>
  </div>
  <div id="game-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="../shared/qrcode.js"></script>
  <script src="../shared/sound.js"></script>
  <script src="sprites.js"></script>
  <script src="victory.js"></script>
  <script src="dialogue-hud.js"></script>
  <script src="hud.js"></script>
  <script src="effects.js"></script>
  <script src="lighting.js"></script>
  <script src="combat-fx.js"></script>
  <script src="game.js"></script>
</body>
</html>
