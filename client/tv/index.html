<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1280, height=720">
  <title>DevLoop RPG</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    #game-container { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
    canvas { display: block; image-rendering: pixelated; }
    #waiting {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: #111; color: #ccc; font-family: 'Courier New', monospace; z-index: 100;
    }
    #waiting h1 { font-size: 48px; color: #ff8800; margin-bottom: 20px; }
    #waiting p { font-size: 20px; color: #888; }
    #waiting .url { color: #44cc44; font-size: 24px; margin-top: 20px; }
    #waiting.hidden { display: none; }
  </style>
</head>
<body>
  <div id="waiting">
    <h1>DevLoop RPG</h1>
    <p>Waiting for players to connect...</p>
    <p class="url">Phone: http://<span id="server-ip">localhost</span>:3000/phone</p>
    <p style="margin-top: 40px; color: #555;">Players: <span id="player-count">0</span>/2</p>
  </div>
  <div id="game-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="game.js"></script>
</body>
</html>
